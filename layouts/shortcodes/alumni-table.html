<div class="overflow-x-auto">
  <table class="w-full text-sm text-left border-collapse">
    <thead>
      <tr class="border-b-2 border-zinc-300 dark:border-zinc-600">
        <th class="py-2 pr-6 font-semibold">Name</th>
        <th class="py-2 pr-6 font-semibold">Position</th>
        <th class="py-2 pr-6 font-semibold">Active</th>
        <th class="py-2 pr-6 font-semibold">Current Affiliation</th>
      </tr>
    </thead>
    <tbody>
      {{ range $.Site.Data.alumni }}
      <tr class="border-b border-zinc-200 dark:border-zinc-700">
        <td class="py-2 pr-6">{{ .name }}</td>
        <td class="py-2 pr-6 text-zinc-600 dark:text-zinc-400">{{ .position }}</td>
        <td class="py-2 pr-6 text-zinc-600 dark:text-zinc-400">{{ .active }}</td>
        <td class="py-2 pr-6">{{ if .affiliation }}{{ .affiliation }}{{ else }}—{{ end }}</td>
      </tr>
      {{ end }}
    </tbody>
  </table>
</div>
